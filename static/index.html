<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Already Said</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell" id="shell">
      <section class="panel panel-editor">
        <div class="panel-header">
          <div class="panel-heading">
            <h1>Draft input</h1>
          </div>
          <div class="controls">
            <label class="style-picker">
              <span>References</span>
              <select id="citation-style">
                <option value="harvard">Harvard</option>
                <option value="oxford">Oxford</option>
              </select>
            </label>
          </div>
        </div>
        <div class="panel-rule" aria-hidden="true"></div>
        <div class="panel-body panel-body-editor">
          <textarea id="editor" spellcheck="false" placeholder="Write."></textarea>
        </div>
        <div class="panel-footer">
          <p class="footer-label">Local text field</p>
        </div>
      </section>

      <div class="splitter" id="splitter" aria-hidden="true"></div>

      <section class="panel panel-archive">
        <div class="panel-header">
          <div class="panel-heading">
            <h2>Archive output</h2>
          </div>
          <p class="stats" id="stats">Index loading...</p>
        </div>
        <div class="panel-rule" aria-hidden="true"></div>
        <div class="panel-body panel-body-archive">
          <article class="quotation-output" id="quotation-output">
            <p class="empty">Start writing on the left. Quotations will gather here.</p>
          </article>
          <section class="matches">
            <div class="matches-header">
              <h3>Source Matches</h3>
            </div>
            <div id="matches-list" class="matches-list"></div>
          </section>
        </div>
        <div class="panel-footer">
          <p class="footer-label">Indexed local archive</p>
        </div>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
